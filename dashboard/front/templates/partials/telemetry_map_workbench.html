<div class="map-workbench">
  <section class="ops-card ops-card-map page-panel map-main-card">
    <div class="ops-head">
      <div>
        <div class="ops-eyebrow">Mapa</div>
        <h2>Telemetría en vivo</h2>
      </div>
      <div class="telemetry-map-controls">
        <span class="telemetry-map-mode" id="telemetry-map-mode">Seguimiento automático</span>
        <label class="telemetry-map-switch" for="telemetry-mining-toggle">
          <input type="checkbox" id="telemetry-mining-toggle" checked>
          <span>Capa ARCOM</span>
        </label>
        <label class="telemetry-map-style-wrap telemetry-osint-layer-wrap" for="telemetry-osint-layer">
          <span>OSINT</span>
          <select class="telemetry-map-style telemetry-osint-layer" id="telemetry-osint-layer">
            <option value="none">Nada</option>
            <option value="all">Todo OSINT</option>
            <option value="eventos_homicido_sicariato">Homicidios/Sicariatos</option>
            <option value="eventos_operativos_ffoo">Operativos FFOO</option>
            <option value="eventos_marcadores_criminales">Marcadores Criminales</option>
            <option value="eventos_mineria_ilegal">Minería Ilegal</option>
            <option value="eventos_paso_ilegal">Pasos Ilegales</option>
            <option value="eventos_paso_oficial">Pasos Oficiales</option>
            <option value="eventos_unidades_ffaa">Unidades FFAA</option>
            <option value="rutas_narcotrafico">Rutas Narcotráfico</option>
            <option value="punto_interes_policias">UPC / Policía</option>
            <option value="punto_interes_gdos.puntos">Puntos GDO</option>
            <option value="zonas_poligonos_gdo">Zonas GDO</option>
          </select>
        </label>
        <label class="telemetry-map-switch" for="telemetry-opensky-toggle">
          <input type="checkbox" id="telemetry-opensky-toggle">
          <span>Tráfico Aéreo</span>
        </label>
        <label class="telemetry-map-style-wrap" for="telemetry-map-style">
          <span></span>
          <select class="telemetry-map-style" id="telemetry-map-style">
            <option value="gray">Principal</option>
            <option value="satellite">Satelital</option>
            <option value="dark">Oscuro</option>
            <option value="relief">Relieve</option>
          </select>
        </label>
        <button class="camera-register-secondary telemetry-map-recenter" id="telemetry-map-recenter" type="button">
          Recentrar
        </button>
        <button class="camera-register-secondary telemetry-map-swap" id="telemetry-map-swap" type="button">
          Intercambiar vista
        </button>
        <button class="camera-register-secondary telemetry-track-export" id="telemetry-track-export" type="button">
          Exportar rutas
        </button>
        <button class="camera-register-secondary telemetry-track-clear" id="telemetry-track-clear" type="button">
          Clear
        </button>
      </div>
    </div>
    <div class="telemetry-map-stage">
      <div class="telemetry-monitor-filter telemetry-map-filter">
        <label for="telemetry-device-filter">Monitorear vehículo</label>
        <select id="telemetry-device-filter">
          <option value="">Todos los dispositivos</option>
        </select>
      </div>
      <div class="map-canvas page-map-canvas" id="telemetry-map"></div>
      <div class="telemetry-map-overlay-box" id="telemetry-map-overlay-box" aria-hidden="true" hidden>
        <div class="telemetry-map-overlay-preview" id="telemetry-map-overlay-preview"></div>
        <button class="telemetry-map-overlay-close" id="telemetry-map-overlay-close" type="button" aria-label="Cerrar vista previa">&times;</button>
        <div class="telemetry-map-overlay-organization" id="telemetry-map-overlay-organization" hidden></div>
      </div>
    </div>
  </section>

  __TELEMETRY_FOCUS_RAIL__
</div>
