<body class="page-events">
  <div class="app-shell is-sidebar-collapsed">
    __INCLUDE:partials/app_sidebar.html__

    <main class="app-main">
      <header class="top top-page top-page-events" id="dashboard-top">
        <div class="heading">
          <div class="eyebrow">Centro de Logs</div>
          <h2 class="title">Logs Operativos</h2>
        </div>
        <div class="page-hero-strip" aria-label="Resumen de eventos">
        </div>
      </header>

      <div class="wrap">
        <section class="page-section-shell page-events-shell">
          <div class="page-section-head">
            <div class="page-section-badge">Monitoreo activo</div>
          </div>

          <div class="events-workbench">
            <section class="ops-card page-panel events-main-card events-log-main">
              <div class="logs-toolbar">
                <div class="logs-mode-switch" id="logs-mode-switch" aria-label="Modos de logs">
                  <button class="logs-mode-pill is-active" type="button" data-log-mode="general">Generales</button>
                  <button class="logs-mode-pill" type="button" data-log-mode="alerts">Alertas</button>
                  <button class="logs-mode-pill" type="button" data-log-mode="tlogs">TLogs</button>
                </div>

                <label class="logs-filter" for="events-device-filter">
                  <span>Drone o vehículo</span>
                  <select id="events-device-filter">
                    <option value="">Todos los dispositivos</option>
                  </select>
                </label>
              </div>

              <div class="event-feed page-feed" id="events-feed"></div>
            </section>

            <aside class="event-rail">
              <section class="ops-card page-info-card">
                <div class="ops-head">
                  <div>
                    <div class="ops-eyebrow">Resumen</div>
                    <h2>Estado del centro de logs</h2>
                  </div>
                </div>
                <div class="logs-summary-grid" id="events-summary"></div>
              </section>

              <section class="ops-card page-accent-card">
                <div class="ops-head">
                  <div>
                    <div class="ops-eyebrow">Detalle</div>
                    <h2>Registro seleccionado</h2>
                  </div>
                </div>
                <div class="logs-detail" id="events-detail"></div>
              </section>
            </aside>
          </div>
        </section>

        <div class="errors">__ERROR_BLOCK__</div>
      </div>
    </main>
  </div>

  <script>
    window.__WEB_APP_CONFIG__ = {
      cameras: __CAMERA_ITEMS_JSON__,
      devices: __DEVICE_CATALOG_JSON__,
      defaultCamera: __DEFAULT_CAMERA_JSON__,
      staticAssetVersion: "__STATIC_ASSET_VERSION__",
      telemetryRefreshMs: __TELEMETRY_REFRESH_MS__,
    };
  </script>
  <script src="/static/web_app.js?v=__STATIC_ASSET_VERSION__"></script>
</body>
